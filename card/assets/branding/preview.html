<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Salinda — תצוגת לוגואים</title>
  <style>
    body { margin: 0; padding: 24px; font-family: system-ui, sans-serif; background: #0f172a; color: #e2e8f0; }
    h1 { font-size: 1.25rem; margin: 0 0 8px; }
    p { margin: 0 0 20px; color: #94a3b8; font-size: 0.9rem; }
    section { margin-bottom: 32px; }
    section h2 { font-size: 1rem; margin: 0 0 12px; color: #fbbf24; }
    img { max-width: 100%; height: auto; display: block; border-radius: 12px; border: 1px solid #334155; background: #020617; }
    a { color: #38bdf8; }
  </style>
</head>
<body>
  <h1>Salinda / סלינדה — כל קבצי הלוגו</h1>
  <p>גרור את הקובץ הזה לדפדפן, או לחץ לחיצה ימנית → Open with → הדפדפן שלך. הקישורים הם יחסיים לתיקייה הזו, אז הם לא אמורים להישבר.</p>

  <section>
    <h2>קונספט 1</h2>
    <img src="salinda-logo-concept-1.svg" alt="Salinda concept 1" width="1200" height="500" />
  </section>
  <section>
    <h2>קונספט 2</h2>
    <img src="salinda-logo-concept-2.svg" alt="Salinda concept 2" width="1200" height="500" />
  </section>
  <section>
    <h2>קונספט 3</h2>
    <img src="salinda-logo-concept-3.svg" alt="Salinda concept 3" width="1200" height="500" />
  </section>
  <section>
    <h2>גרסה סופית</h2>
    <img src="salinda-logo-final.svg" alt="Salinda final logo" width="1200" height="500" />
  </section>
  <section>
    <h2>אייקון בלבד</h2>
    <img src="salinda-app-icon-variant.svg" alt="Salinda app icon" width="512" height="512" style="max-width: 320px;" />
  </section>
</body>
</html>
